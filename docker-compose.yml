services:
  qdrant:
    image: qdrant/qdrant:latest # version mới nhất
    container_name: qdrant
    ports:
      - "6333:6333" # rest api port
      - "6334:6334" # wen UI port
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334 # open grpc port
    restart: unless-stopped
    networks:
      - chatbot-network
networks:
  chatbot-network:
    driver: bridge
volumes:
  qdrant_data:
